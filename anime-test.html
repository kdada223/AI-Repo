<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비트 애니 테스트 - 나랑 닮은 캐릭터는?</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #webcam-container {
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--neon-blue);
            width: 200px;
            height: 200px;
            box-shadow: 0 0 20px var(--neon-blue);
        }
        canvas {
            width: 100% !important;
            height: auto !important;
        }
        .prediction-bar-container {
            margin-top: 10px;
            text-align: left;
        }
        .prediction-label {
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: var(--neon-blue);
        }
        .progress-bg {
            background: rgba(255, 255, 255, 0.1);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            width: 0%;
            transition: width 0.2s ease;
        }
        .loading-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: var(--neon-pink);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn" title="테마 변경">🌙</button>
    </div>
    
    <div class="layout-wrapper">
        <div class="container">
            <header>
                <h1 class="pixel-text">ANIME LOOK-ALIKE</h1>
                <p class="subtitle">카메라에 얼굴을 비추면, 당신과 닮은 웃긴 캐릭터를 찾아드립니다.</p>
            </header>

            <main>
                <section id="test-card" class="card">
                    <div id="start-view">
                        <div style="font-size: 4rem; margin-bottom: 20px;">🎭</div>
                        <p class="pixel-text-sub" style="margin-bottom: 2rem; font-size: 1rem;">준비되셨나요?</p>
                        <button onclick="init()" class="pixel-btn">테스트 시작하기</button>
                        <p style="margin-top: 15px; font-size: 0.7rem; color: var(--text-gray);">*카메라 권한이 필요합니다</p>
                    </div>

                    <div id="loading-view" class="hidden">
                        <p class="loading-text">모델 로딩 중...</p>
                    </div>

                    <div id="webcam-view" class="hidden">
                        <div id="webcam-container"></div>
                        <div id="label-container"></div>
                        <button onclick="stopWebcam()" class="pixel-btn secondary" style="margin-top: 2rem;">종료하기</button>
                    </div>
                </section>

                <a href="index.html" class="pixel-btn secondary" style="display: inline-block; text-decoration: none; margin-top: 2rem; width: auto; padding: 0.8rem 2rem;">← 부적 생성기로 돌아가기</a>
            </main>

            <footer>
                <p>&copy; 2026 Anime Look-alike Test</p>
            </footer>
        </div>

        <aside class="comment-section">
            <div id="disqus_thread"></div>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        // 테마 토글 로직
        const themeBtn = document.getElementById('theme-btn');
        const body = document.body;
        const currentTheme = localStorage.getItem('theme') || 'dark';
        body.setAttribute('data-theme', currentTheme);
        themeBtn.innerText = currentTheme === 'dark' ? '🌙' : '☀️';

        themeBtn.addEventListener('click', () => {
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.innerText = newTheme === 'dark' ? '🌙' : '☀️';
            if (typeof DISQUS !== 'undefined') { DISQUS.reset({reload: true}); }
        });

        // Disqus
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = 'anime-lookalike-test';
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://luck-station.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();

        // Teachable Machine 로직
        const URL = "https://teachablemachine.withgoogle.com/models/EWRsTxyo7/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            document.getElementById('start-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true;
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('webcam-view').classList.remove('hidden');
            
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ''; 
            for (let i = 0; i < maxPredictions; i++) {
                const container = document.createElement("div");
                container.className = "prediction-bar-container";
                container.innerHTML = `
                    <div class="prediction-label"></div>
                    <div class="progress-bg"><div class="progress-fill"></div></div>
                `;
                labelContainer.appendChild(container);
            }
        }

        async function loop() {
            if (webcam && webcam.canvas) {
                webcam.update();
                await predict();
                window.requestAnimationFrame(loop);
            }
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(0);
                
                const label = labelContainer.childNodes[i].querySelector('.prediction-label');
                const bar = labelContainer.childNodes[i].querySelector('.progress-fill');
                
                label.innerHTML = `${classPrediction}: ${probability}%`;
                bar.style.width = `${probability}%`;
            }
        }

        function stopWebcam() {
            if (webcam) {
                webcam.stop();
                document.getElementById('webcam-view').classList.add('hidden');
                document.getElementById('start-view').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
