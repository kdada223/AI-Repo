<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비트 애니 테스트 - 나랑 닮은 캐릭터는?</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #image-preview-container {
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--neon-blue);
            width: 250px;
            height: 250px;
            box-shadow: 0 0 20px var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
        }
        #image-preview {
            max-width: 100%;
            max-height: 100%;
            display: none;
        }
        .prediction-bar-container {
            margin-top: 10px;
            text-align: left;
        }
        .prediction-label {
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: var(--neon-blue);
        }
        .progress-bg {
            background: rgba(255, 255, 255, 0.1);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            width: 0%;
            transition: width 0.5s ease;
        }
        .loading-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: var(--neon-pink);
            margin: 20px 0;
        }
        #upload-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn" title="테마 변경">🌙</button>
    </div>
    
    <div class="layout-wrapper">
        <div class="container">
            <header>
                <h1 class="pixel-text">ANIME LOOK-ALIKE</h1>
                <p class="subtitle">사진을 업로드하면, 당신과 닮은 웃긴 캐릭터를 찾아드립니다.</p>
            </header>

            <main>
                <section id="test-card" class="card">
                    <div id="upload-view">
                        <div style="font-size: 4rem; margin-bottom: 20px;">🖼️</div>
                        <p class="pixel-text-sub" style="margin-bottom: 2rem; font-size: 1rem;">당신의 사진을 보여주세요!</p>
                        <input type="file" id="upload-input" accept="image/*">
                        <button onclick="document.getElementById('upload-input').click()" class="pixel-btn">사진 업로드하기</button>
                        <p style="margin-top: 15px; font-size: 0.7rem; color: var(--text-gray);">*얼굴이 잘 나온 사진일수록 정확합니다</p>
                    </div>

                    <div id="loading-view" class="hidden">
                        <p class="loading-text">인공지능 분석 중...</p>
                    </div>

                    <div id="result-view" class="hidden">
                        <div id="comparison-container">
                            <div class="image-box">
                                <img id="image-preview" src="#" alt="your image">
                                <div class="image-label">YOU</div>
                            </div>
                            <div class="vs-text">VS</div>
                            <div class="image-box" id="character-box">
                                <img id="character-img" src="" alt="character">
                                <div class="image-label" id="character-label">ANIME</div>
                            </div>
                        </div>
                        <div id="label-container"></div>
                        <button onclick="resetTest()" class="pixel-btn secondary" style="margin-top: 2rem;">다른 사진으로 하기</button>
                    </div>
                </section>

                <a href="index.html" class="pixel-btn secondary" style="display: inline-block; text-decoration: none; margin-top: 2rem; width: auto; padding: 0.8rem 2rem;">← 부적 생성기로 돌아가기</a>
            </main>

            <footer>
                <p>&copy; 2026 Anime Look-alike Test</p>
            </footer>
        </div>

        <aside class="comment-section">
            <div id="disqus_thread"></div>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        // 테마 및 Disqus 설정 (기존과 동일)
        const themeBtn = document.getElementById('theme-btn');
        const body = document.body;
        const currentTheme = localStorage.getItem('theme') || 'dark';
        body.setAttribute('data-theme', currentTheme);
        themeBtn.innerText = currentTheme === 'dark' ? '🌙' : '☀️';

        themeBtn.addEventListener('click', () => {
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.innerText = newTheme === 'dark' ? '🌙' : '☀️';
            if (typeof DISQUS !== 'undefined') { DISQUS.reset({reload: true}); }
        });

        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = 'anime-lookalike-test';
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://luck-station.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();

        // Teachable Machine 로직 (업로드 방식)
        const URL = "https://teachablemachine.withgoogle.com/models/EWRsTxyo7/";
        let model, maxPredictions;

        // 모델 미리 로드
        async function loadModel() {
            if (!model) {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
            }
        }

        const uploadInput = document.getElementById('upload-input');
        const imagePreview = document.getElementById('image-preview');

        uploadInput.addEventListener('change', async (e) => {
            if (e.target.files && e.target.files[0]) {
                document.getElementById('upload-view').classList.add('hidden');
                document.getElementById('loading-view').classList.remove('hidden');

                await loadModel();

                const reader = new FileReader();
                reader.onload = async (event) => {
                    imagePreview.src = event.target.result;
                    imagePreview.style.display = 'block';
                    
                    // 이미지가 로드된 후 예측 실행
                    imagePreview.onload = async () => {
                        await predict();
                        document.getElementById('loading-view').classList.add('hidden');
                        document.getElementById('result-view').classList.remove('hidden');
                    };
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // 캐릭터별 이미지 매핑 (실제 이미지 경로로 수정 가능)
        const characterImages = {
            '마인부우': 'https://upload.wikimedia.org/wikipedia/ko/a/af/%EB%A7%88%EC%9D%B8_%EB%B6%80%EC%9A%B0.png',
            '잔망루피': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzHOfW6e0kF5f8IuL9L5n7I1K5vS1E3f7mXQ&s',
            '훈이': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6-mXp7pX-mYxL-I5-F5-u-5-m-m-m-m-m-m&s',
            '퉁퉁이': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR-p-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m&s',
            '도이츠 진': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-p-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m&s',
            '치킨런': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-p-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m&s',
            '토마스': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-p-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m&s',
            '드라이브 아저씨': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-p-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m&s',
            '브레드아저씨': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-p-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m&s',
            '카레빵맨': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-p-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m&s',
            '로즈': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-p-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m-x-m&s'
        };

        async function predict() {
            const prediction = await model.predict(imagePreview);
            const labelContainer = document.getElementById("label-container");
            const characterImg = document.getElementById("character-img");
            const characterLabel = document.getElementById("character-label");
            
            labelContainer.innerHTML = ''; 

            // 결과 정렬 (확률 높은 순)
            prediction.sort((a, b) => b.probability - a.probability);

            // 가장 높은 확률의 캐릭터 이미지 표시
            const topResult = prediction[0].className;
            characterImg.src = characterImages[topResult] || 'https://via.placeholder.com/220?text=No+Image';
            characterLabel.innerText = topResult;

            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(0);
                
                const container = document.createElement("div");
                container.className = "prediction-bar-container";
                container.innerHTML = `
                    <div class="prediction-label">${classPrediction}: ${probability}%</div>
                    <div class="progress-bg"><div class="progress-fill" style="width: ${probability}%"></div></div>
                `;
                labelContainer.appendChild(container);
            }
        }

        function resetTest() {
            uploadInput.value = '';
            document.getElementById('result-view').classList.add('hidden');
            document.getElementById('upload-view').classList.remove('hidden');
            imagePreview.style.display = 'none';
        }
        
        // 페이지 로드 시 모델 미리 준비
        loadModel();
    </script>
</body>
</html>
